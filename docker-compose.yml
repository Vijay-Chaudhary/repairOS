# ─────────────────────────────────────────────────────────────────────────────
# RepairOS — local development stack
#
# Services            Port (host)   Notes
#  postgres           (internal)    PostgreSQL 16 — master + tenant DBs
#  pgbouncer          6432          Transaction-mode pool fronting postgres
#  redis              6379          Celery broker + Channels + cred cache
#  backend            8000          Django/Daphne (ASGI)
#  celery-worker      —             high / default / low queues
#  celery-beat        —             DatabaseScheduler periodic tasks
#  frontend           3000          Next.js 14 HMR dev server
#  minio              9000, 9001    S3-compatible object store (local stub)
#  minio-init         —             one-shot: creates repaiross-local bucket
#  mailpit            8025 (UI)     Local SMTP catch-all
#  adminer            8080          DB browser (connect to pgbouncer:5432)
#
# Quick start:
#   cp .env.example .env            # fill in generated keys
#   docker compose up -d
#   docker compose logs -f backend  # watch seed + daphne startup
# ─────────────────────────────────────────────────────────────────────────────

# ── Re-usable YAML anchors ────────────────────────────────────────────────────

x-backend-base: &backend-base
  build:
    context: backend
    dockerfile: Dockerfile
    target: dev
  env_file: .env
  volumes:
    - ./backend:/app
    # Seed script and pgbouncer config live outside backend/ but are needed inside
    - ./infra/docker/seed.sh:/app/infra/docker/seed.sh:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: repaiross_master
      # Passed through to init.sh
      MASTER_DB_PASSWORD: ${MASTER_DB_PASSWORD}
      PGBOUNCER_AUTH_PASSWORD: ${PGBOUNCER_AUTH_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    # Not exposed to host — connect via pgbouncer:6432 or adminer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repaiross_master"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── PgBouncer 1.22 ──────────────────────────────────────────────────────────
  # Transaction-mode pool fronting the single postgres instance.
  # Wildcard [databases] entry auto-pools every repaiross_tenant_* DB.
  # See infra/pgbouncer/pgbouncer.ini for runtime tenant-pool addition docs.
  pgbouncer:
    build:
      context: infra/pgbouncer
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PGBOUNCER_ADMIN_PASSWORD: ${PGBOUNCER_ADMIN_PASSWORD}
      PGBOUNCER_AUTH_PASSWORD: ${PGBOUNCER_AUTH_PASSWORD}
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${PGBOUNCER_ADMIN_PASSWORD} psql -h 127.0.0.1 -p 5432 -U pgbouncer_admin -d pgbouncer -c 'SHOW VERSION' -q >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Django / Daphne ─────────────────────────────────────────────────────────
  # seed.sh: migrate master DB → provision demo tenants → start daphne
  backend:
    <<: *backend-base
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker ───────────────────────────────────────────────────────────
  celery-worker:
    <<: *backend-base
    command: >
      celery -A config.celery worker
        -l info
        -Q high,default,low
        --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery beat ─────────────────────────────────────────────────────────────
  celery-beat:
    <<: *backend-base
    command: >
      celery -A config.celery beat
        -l info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Next.js 14 dev server ───────────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_MINIO_URL: ${NEXT_PUBLIC_MINIO_URL}
    depends_on:
      - backend

  # ── MinIO (local S3) ────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot container: creates the bucket and sets public read policy
  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 '${MINIO_ROOT_USER}' '${MINIO_ROOT_PASSWORD}' &&
        mc mb --ignore-existing local/${AWS_STORAGE_BUCKET_NAME} &&
        mc anonymous set download local/${AWS_STORAGE_BUCKET_NAME} &&
        echo 'bucket ready'
      "
    restart: "no"

  # ── Mailpit (local email) ───────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:v1.21.6
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI — http://localhost:8025
      - "1025:1025"   # SMTP

  # ── Adminer (DB browser) ────────────────────────────────────────────────────
  # Connect to: server=pgbouncer, user=repaiross_master_user, db=repaiross_master
  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - pgbouncer

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  minio_data:
  frontend_node_modules:
  frontend_next:
