name: CI/CD

# Test on every push & PR. Build images and deploy to the Hostinger VPS only
# when commits land on master and the test gate is green.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ── Backend test gate ───────────────────────────────────────────────────────
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    # base.py evaluates SECRET_KEY and MASTER_DATABASE_URL at import time (before
    # test.py can override DATABASES to sqlite), so both must be present in the
    # environment. These are throwaway CI values — production settings keep
    # requiring real secrets (no defaults), so prod still fails loudly if unset.
    env:
      SECRET_KEY: ci-insecure-test-secret-key-not-for-production
      MASTER_DATABASE_URL: "sqlite://:memory:"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements/*.txt

      - name: Install dependencies
        run: pip install -r requirements/local.txt

      - name: Lint (syntax/compile gate)
        # No dedicated linter is configured in the project; compileall is a cheap
        # syntax gate that catches broken imports/syntax before the test run.
        run: python -m compileall -q apps config

      - name: Run pytest (deselecting known pre-existing failures)
        # Uses config.settings.test (sqlite) — see backend/pytest.ini.
        # ci-known-failures.txt lists pre-existing failures to deselect (option b);
        # coverage is reported but not enforced in CI (deselect lowers the %).
        run: |
          DESELECT=$(grep -vE '^\s*#|^\s*$' ci-known-failures.txt \
            | sed 's/^/--deselect /' | tr '\n' ' ')
          echo "Deselecting: ${DESELECT:-<none>}"
          pytest -o addopts="" \
            --cov=apps --cov-report=term-missing --cov-fail-under=0 \
            $DESELECT

  # ── Frontend test gate ──────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend tests (lint + typecheck + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  # ── Build & push images to GHCR ─────────────────────────────────────────────
  build-and-push:
    name: Build & push images
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image names (lowercase owner + SHA tag)
        id: meta
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=ghcr.io/${owner}/repaiross-backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${owner}/repaiross-frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_repo=ghcr.io/${owner}/repaiross-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_repo=ghcr.io/${owner}/repaiross-frontend" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_repo }}:${{ github.sha }}
            ${{ steps.meta.outputs.backend_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          target: production
          push: true
          # NEXT_PUBLIC_* are inlined at build time — supply prod URLs here.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_MINIO_URL=${{ vars.NEXT_PUBLIC_MINIO_URL }}
          tags: |
            ${{ steps.meta.outputs.frontend_repo }}:${{ github.sha }}
            ${{ steps.meta.outputs.frontend_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Hostinger VPS over SSH ────────────────────────────────────────
  deploy:
    name: Deploy to Hostinger VPS
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          # Fail the deploy if any command fails.
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_DIR }}"

            COMPOSE="docker compose -f docker-compose.prod.yml"

            # Remember the last known-good tag for auto-rollback.
            PREV_TAG="$(cat .deployed_tag 2>/dev/null || echo '')"
            NEW_TAG='${{ github.sha }}'

            export BACKEND_IMAGE='${{ needs.build-and-push.outputs.backend_image }}'
            export FRONTEND_IMAGE='${{ needs.build-and-push.outputs.frontend_image }}'

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            # Refresh repo (compose/nginx/infra/scripts) without touching .env.
            git fetch --depth 1 origin master
            git reset --hard origin/master

            # Backend entrypoint runs migrations + collectstatic on start.
            $COMPOSE pull backend frontend
            $COMPOSE build pgbouncer
            $COMPOSE up -d --remove-orphans

            # Health gate → auto-rollback to the previous good tag on failure.
            if bash infra/scripts/healthcheck.sh; then
              echo "$NEW_TAG" > .deployed_tag
              docker image prune -f
              docker logout ghcr.io
            else
              echo "::error::Health check failed — rolling back"
              if [ -n "$PREV_TAG" ]; then
                bash infra/scripts/rollback.sh "$PREV_TAG" || true
              fi
              docker logout ghcr.io
              exit 1
            fi
