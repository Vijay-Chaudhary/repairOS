# RepairOS — PostgreSQL 16 production tuning
#
# Sized for the `postgres` container's 2 GB memory limit on the Hostinger KVM 2
# box (NOT the full 8 GB — the host also runs Redis, Django, Celery, Next.js,
# Nginx, MinIO). Conservative on purpose: stability > squeezing every MB.
#
# Mounted read-only and loaded via `-c config_file=` (see docker-compose.prod.yml).

# ── Connections ───────────────────────────────────────────────────────────────
# PgBouncer (transaction mode) fronts Postgres, so the number of *real* backends
# stays low. 100 is plenty of headroom above the pooled active set.
max_connections = 100
superuser_reserved_connections = 3

listen_addresses = '*'

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers = 512MB                 # ~25% of the 2 GB container
effective_cache_size = 1536MB          # ~75% — planner hint, not an allocation
work_mem = 8MB                         # per sort/hash node; safe with pooled conns
maintenance_work_mem = 128MB           # VACUUM / CREATE INDEX / tenant provisioning
hash_mem_multiplier = 2.0

# ── WAL / checkpoints ─────────────────────────────────────────────────────────
wal_level = replica                    # enables PITR base backups later
wal_compression = on
max_wal_size = 2GB
min_wal_size = 256MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

# ── Planner ───────────────────────────────────────────────────────────────────
random_page_cost = 1.1                 # NVMe SSD — random ≈ sequential
effective_io_concurrency = 200
default_statistics_target = 100

# ── Autovacuum (multi-tenant churn) ───────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_limit = 1000

# ── Logging (slow queries; stdout for `docker compose logs`) ──────────────────
logging_collector = off
log_min_duration_statement = 1000      # log statements slower than 1s
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%t [%p] %u@%d '

# ── Timeouts ──────────────────────────────────────────────────────────────────
statement_timeout = 60000              # 60s safety net
idle_in_transaction_session_timeout = 60000
timezone = 'Asia/Kolkata'
