# RepairOS — Nginx bare-IP config (HTTP only, no TLS/domain).
# Single host on :80, path-based routing. Used with docker-compose.ip.yml
# until a domain + Let's Encrypt cutover switches back to nginx.production.conf.
#
#   /            → Next.js frontend (:3000)
#   /api/, /ws/  → Django backend (:8000)
#   /static/     → collected Django static assets (shared volume)
#   /media/      → MinIO object storage (:9000)

# NOTE: no `keepalive` here. Upstream keepalive requires `proxy_http_version 1.1`
# + `proxy_set_header Connection ""` in every proxy location, or nginx reuses
# connections the upstream has closed and returns intermittent 502s. A fresh
# connection per request is fine at this scale and avoids that whole class of bug.
upstream backend {
    server backend:8000;
}
upstream frontend {
    server frontend:3000;
}
upstream minio {
    server minio:9000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_status 429;

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
    application/json application/javascript application/xml
    text/plain text/css text/javascript image/svg+xml
    application/x-font-ttf font/woff2;

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50M;

    # Login/refresh responses set a large Set-Cookie (the refresh-token JWT),
    # which overflows nginx's default 4k proxy header buffer → "upstream sent
    # too big header" → 502. Enlarge the proxy buffers to fit.
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        proxy_pass http://minio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location ~ ^/api/v1/(auth|token) {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api burst=60 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
