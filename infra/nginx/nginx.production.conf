# RepairOS — Nginx production config
#
# Domains:
#   app.repaiross.app       → Next.js frontend
#   *.api.repaiross.app     → Django backend (tenant slug in subdomain)
#   api.repaiross.app       → Django backend (platform admin / master API)

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ── Backend API (tenant subdomains + master API) ─────────────────────────────

server {
    listen 443 ssl http2;
    server_name ~^(?<slug>.+)\.api\.repaiross\.app$ api.repaiross.app;

    ssl_certificate     /etc/ssl/certs/repaiross.crt;
    ssl_certificate_key /etc/ssl/private/repaiross.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;
    gzip on;
    gzip_types application/json text/plain;

    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ── Frontend PWA ─────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name app.repaiross.app;

    ssl_certificate     /etc/ssl/certs/repaiross.crt;
    ssl_certificate_key /etc/ssl/private/repaiross.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /_next/static/ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────

server {
    listen 80;
    server_name *.repaiross.app repaiross.app;
    return 301 https://$host$request_uri;
}
