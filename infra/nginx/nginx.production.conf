# RepairOS — Nginx production config
#
# Domains:
#   app.repaiross.app       → Next.js frontend (PWA)
#   *.api.repaiross.app     → Django backend (tenant slug in subdomain)
#   api.repaiross.app       → Django backend (platform admin / master API)
#   media.repaiross.app     → MinIO object storage (public media)
#
# Included into the http{} block via /etc/nginx/conf.d/default.conf.

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

upstream minio {
    server minio:9000;
    keepalive 16;
}

# WebSocket upgrade handling.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Rate limiting ─────────────────────────────────────────────────────────────
# Per-IP zones. `api` is generous for normal app use; `auth` is strict to blunt
# credential-stuffing on login/token endpoints. burst+nodelay absorbs spikes.
limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_status 429;

# ── Compression ───────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
    application/json application/javascript application/xml
    text/plain text/css text/javascript image/svg+xml
    application/x-font-ttf font/woff2;

# Shared SSL hardening.
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         HIGH:!aNULL:!MD5;
ssl_prefer_server_ciphers on;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;

# ── Backend API (tenant subdomains + master API) ─────────────────────────────

server {
    listen 443 ssl;
    http2 on;
    server_name ~^(?<slug>.+)\.api\.repaiross\.app$ api.repaiross.app;

    ssl_certificate     /etc/letsencrypt/live/repaiross.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/repaiross.app/privkey.pem;

    client_max_body_size 50M;

    # Security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Django static assets (admin + DRF browsable API), from the shared volume.
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WebSockets (Django Channels).
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    # Strict rate limit on auth/token endpoints.
    location ~ ^/api/v1/(auth|token) {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        limit_req zone=api burst=60 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ── Frontend PWA ─────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    http2 on;
    server_name app.repaiross.app;

    ssl_certificate     /etc/letsencrypt/live/repaiross.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/repaiross.app/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /_next/static/ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ── Media (MinIO / S3-compatible) ─────────────────────────────────────────────
# django-storages generates URLs at media.repaiross.app/<bucket>/<key>; nginx
# proxies them straight to the MinIO S3 API. Swapping to AWS S3/CloudFront later
# is just an env change (AWS_S3_CUSTOM_DOMAIN) — this block can be removed.

server {
    listen 443 ssl;
    http2 on;
    server_name media.repaiross.app;

    ssl_certificate     /etc/letsencrypt/live/repaiross.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/repaiross.app/privkey.pem;

    client_max_body_size 50M;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://minio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
    }
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────

server {
    listen 80;
    server_name *.repaiross.app repaiross.app;

    # Let's Encrypt HTTP-01 challenge (certbot webroot) — plain HTTP, so it sits
    # before the HTTPS redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
