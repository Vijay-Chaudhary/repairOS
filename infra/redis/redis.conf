# RepairOS — Redis 7 production config
#
# One Redis instance, three logical DBs (set by the apps via the URL):
#   /0 Celery broker + results   /1 Django cache   /2 Channels layer
#
# The password is supplied at runtime from the REDIS_PASSWORD env var via the
# command in docker-compose.prod.yml (`redis-server /etc/redis/redis.conf
# --requirepass "$REDIS_PASSWORD"`), so no secret is baked into this file.

bind 0.0.0.0
protected-mode yes
port 6379

# ── Memory ────────────────────────────────────────────────────────────────────
# Cap matches the container limit. allkeys-lru lets the cache DB evict under
# pressure; broker/channel keys are short-lived so they rarely hit the ceiling.
maxmemory 448mb
maxmemory-policy allkeys-lru

# ── Persistence ───────────────────────────────────────────────────────────────
# RDB snapshots (point-in-time) + AOF (durability) — survives restarts so the
# Celery broker does not lose queued tasks on a deploy/reboot.
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec
dir /data

# ── Misc ──────────────────────────────────────────────────────────────────────
tcp-keepalive 60
timeout 0
loglevel notice
