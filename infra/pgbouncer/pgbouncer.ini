[databases]
; ── Wildcard pool ─────────────────────────────────────────────────────────────
; Any database name — including dynamically-provisioned repaiross_tenant_* DBs —
; is automatically routed to the single postgres instance.
;
; HOW A NEW TENANT POOL IS ADDED (mirrors production §5.4):
;   In local dev the wildcard "*" handles it with zero action.
;   In production/staging (explicit entries only), after create_tenant runs:
;     1. Append to pgbouncer.ini:
;          repaiross_tenant_<slug> = host=<rds-host> port=5432 pool_size=5
;     2. Run inside the admin console (psql -p 6432 -U pgbouncer_admin pgbouncer):
;          RELOAD;
;   No restart required — PgBouncer re-reads the config file on RELOAD.
;
* = host=postgres port=5432

[pgbouncer]
listen_addr           = 0.0.0.0
listen_port           = 5432
auth_type             = md5
auth_file             = /tmp/userlist.txt

; Delegate credential verification to postgres so dynamically-created
; repaiross_<slug>_user accounts are authenticated without restarting PgBouncer.
auth_user             = pgbouncer_auth
auth_query            = SELECT usename, passwd FROM pg_shadow WHERE usename=$1
; Run auth_query against master DB — pgbouncer_auth has no access to tenant DBs
; (PUBLIC is revoked on them). pg_shadow is a global view, visible from any DB.
auth_dbname           = repaiross_master

pool_mode             = transaction
max_client_conn       = 400
default_pool_size     = 10
min_pool_size         = 2
reserve_pool_size     = 5
reserve_pool_timeout  = 3
server_idle_timeout   = 30

; ── Safety caps & timeouts (prod-tuned; safe for dev) ─────────────────────────
; Cap real backends per database so many tenant pools can't exhaust Postgres
; max_connections=100. Recycle server conns hourly to bound memory growth.
max_db_connections    = 25
server_lifetime       = 3600
server_connect_timeout = 10
server_login_retry    = 2
; Fail fast instead of hanging clients when the pool is saturated.
query_wait_timeout    = 120
tcp_keepalive         = 1

; Admin console — connect as pgbouncer_admin to database "pgbouncer"
;   psql -h localhost -p 6432 -U pgbouncer_admin pgbouncer
admin_users           = pgbouncer_admin
stats_users           = pgbouncer_admin

log_connections       = 1
log_disconnections    = 1
log_pooler_errors     = 1
stats_period          = 60

pidfile               = /tmp/pgbouncer.pid
# logfile not set — pgbouncer logs to stdout so `docker compose logs pgbouncer` works
