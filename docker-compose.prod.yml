# ─────────────────────────────────────────────────────────────────────────────
# RepairOS — production stack (Hostinger KVM 2: 2 vCPU / 8 GB / 100 GB NVMe)
#
# backend / celery-* / frontend images are pre-built in CI and pulled from GHCR.
# pgbouncer (tiny, no app code) is built locally on first `up`.
#
# Deploy (CI over SSH, or manually on the server):
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Secrets live in .env on the server (see .env.production.example).
# Memory limits are caps (OOM protection), reservations are soft floors.
# Budget: ~2 GB reserved for Ubuntu; container limits total ~5.5 GB.
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-backend-image: &backend-image
  <<: *logging
  image: ${BACKEND_IMAGE:-ghcr.io/vijay-chaudhary/repaiross-backend:latest}
  env_file: .env
  restart: unless-stopped
  networks: [repaiross]
  depends_on:
    postgres:
      condition: service_healthy
    pgbouncer:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    <<: *logging
    image: postgres:16.4-alpine
    restart: unless-stopped
    networks: [repaiross]
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: repaiross_master
      MASTER_DB_PASSWORD: ${MASTER_DB_PASSWORD}
      PGBOUNCER_AUTH_PASSWORD: ${PGBOUNCER_AUTH_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repaiross_master"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 2G }
        reservations: { memory: 512M }

  # ── PgBouncer ───────────────────────────────────────────────────────────────
  pgbouncer:
    <<: *logging
    build:
      context: infra/pgbouncer
      dockerfile: Dockerfile
    image: repaiross-pgbouncer:local
    restart: unless-stopped
    networks: [repaiross]
    environment:
      PGBOUNCER_ADMIN_PASSWORD: ${PGBOUNCER_ADMIN_PASSWORD}
      PGBOUNCER_AUTH_PASSWORD: ${PGBOUNCER_AUTH_PASSWORD}
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${PGBOUNCER_ADMIN_PASSWORD} psql -h 127.0.0.1 -p 5432 -U pgbouncer_admin -d pgbouncer -c 'SHOW VERSION' -q >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 64M }

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    <<: *logging
    image: redis:7.2-alpine
    restart: unless-stopped
    networks: [repaiross]
    command: ["redis-server", "/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/etc/redis/redis.conf:ro
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }

  # ── Django / Daphne (ASGI) ──────────────────────────────────────────────────
  # entrypoint.production.sh: migrate master → migrate all tenants →
  #                           collectstatic → daphne. No demo seeding.
  backend:
    <<: *backend-image
    command: ["/app/entrypoint.production.sh"]
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 768M }
        reservations: { memory: 256M }

  # ── Celery worker ───────────────────────────────────────────────────────────
  # concurrency=2 fits 2 vCPU; child recycling bounds memory (no leaks across
  # long-lived workers). Warm shutdown lets in-flight tasks finish on deploy.
  celery-worker:
    <<: *backend-image
    command: >
      celery -A config.celery worker
        -l info
        -Q high,default,low
        --concurrency=2
        --max-tasks-per-child=100
        --max-memory-per-child=300000
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "celery -A config.celery inspect ping -d celery@$$HOSTNAME >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 768M }
        reservations: { memory: 256M }

  # ── Celery beat ─────────────────────────────────────────────────────────────
  celery-beat:
    <<: *backend-image
    command: >
      celery -A config.celery beat
        -l info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    stop_grace_period: 30s
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 256M }

  # ── Next.js 14 (standalone production server) ───────────────────────────────
  # NEXT_PUBLIC_* values are already baked into this image at build time.
  frontend:
    <<: *logging
    image: ${FRONTEND_IMAGE:-ghcr.io/vijay-chaudhary/repaiross-frontend:latest}
    restart: unless-stopped
    networks: [repaiross]
    depends_on:
      - backend
    stop_grace_period: 20s
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }

  # ── MinIO (self-hosted S3) ──────────────────────────────────────────────────
  # Swap for real AWS S3 by editing AWS_* in .env and removing minio/minio-init.
  minio:
    <<: *logging
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    networks: [repaiross]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }

  minio-init:
    <<: *logging
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    networks: [repaiross]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 '${MINIO_ROOT_USER}' '${MINIO_ROOT_PASSWORD}' &&
        mc mb --ignore-existing local/${AWS_STORAGE_BUCKET_NAME} &&
        mc anonymous set download local/${AWS_STORAGE_BUCKET_NAME} &&
        echo 'bucket ready'
      "
    restart: "no"

  # ── Nginx (TLS termination + reverse proxy) ─────────────────────────────────
  nginx:
    <<: *logging
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks: [repaiross]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.production.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 96M }

# ─────────────────────────────────────────────────────────────────────────────
networks:
  repaiross:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_files:
  certbot_webroot:
