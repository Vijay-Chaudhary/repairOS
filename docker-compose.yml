version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# RepairOS — full-stack local development
#
# Services:
#   postgres   — PostgreSQL 16 (master DB + dynamic tenant DBs)
#   redis      — Redis 7 (Celery broker + Channels + OTP cache)
#   backend    — Django/Daphne (ASGI) on :8000
#   celery     — Celery workers (high/default/low queues)
#   beat       — Celery beat scheduler
#   frontend   — Next.js 14 dev server on :3000
#   nginx      — Reverse proxy on :80 (:443 in production)
#
# Usage:
#   docker compose up                  # start all services
#   docker compose up backend celery   # start only backend services
#   docker compose logs -f backend     # follow backend logs
# ─────────────────────────────────────────────────────────────────────────────

x-backend-env: &backend-env
  env_file: backend/.env
  environment:
    DJANGO_SETTINGS_MODULE: config.settings.local

x-backend-depends: &backend-depends
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ── Data stores ─────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repaiross_master
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repaiross_master"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────────────────────

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --database=default &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    <<: *backend-env
    <<: *backend-depends

  celery:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A config.celery worker
        -l info
        -Q high,default,low
        --concurrency=4
    volumes:
      - ./backend:/app
    <<: *backend-env
    <<: *backend-depends

  beat:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    <<: *backend-env
    <<: *backend-depends

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - backend

  # ── Nginx ────────────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
